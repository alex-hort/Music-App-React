<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1 id="loader">Please wait...</h1>

  <div id="container">
    <h2>Confirm Password</h2>

    <div class="notification-container" id="error"></div>
    <div class="notification-container" id="success"></div>

    <form id="form">

      <div class="form-group">
        <label for="password">New Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" placeholder="••••••••" />
          <span class="toggle-eye" data-target="password" title="Mostrar contraseña">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </span>
        </div>
        <!-- barra de fuerza -->
        <div class="strength-track">
          <div id="strength-bar"></div>
        </div>
        <span id="strength-label"></span>
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm New Password</label>
        <div class="input-wrap">
          <input type="password" id="confirm-password" name="confirmPassword" placeholder="••••••••" />
          <span class="toggle-eye" data-target="confirm-password" title="Mostrar contraseña">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </span>
        </div>
      </div>

      <button type="submit" id="button">Reset Password</button>
    </form>

    <!-- Pantalla de éxito (oculta por defecto) -->
    <div id="success-screen" style="display:none; text-align:center; padding: 16px 0;">
      <div class="check-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h3>Contraseña actualizada</h3>
      <p>Ya puedes iniciar sesión con tu nueva contraseña.</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
